<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny splash RAfting Company - Contact Us</title>
    <meta name="description"
      content="Get in touch with Funny Splash Company to plan your next rafting adventure.">
    <meta name="author" content="Joe Kabusako Iviti">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-boat.png" alt="Rafting boat" width="200">
        <div class="grid">
            <nav>

                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="trips.html">Trips</a>
                <a href="contact.html">Contact Us</a>

            </nav>
        </div>
    </header>
    <main>


        <h1>Funny splash RAfting Company</h1>
        <p>15 AC street</p>
        <p>Ngaliema, Kinshasa</p>
        <p>+243890119831</p>
        <p>joekabusako@gmail.com
        </p>
        <div class="map-form">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d509223.8516967577!2d15.2545892!3d-4.352573999999996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sfr!2scd!4v1775402396910!5m2!1sfr!2scd"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>


                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="placeholder">


                <label for="useremail">Email:</label>
                <input type="email" id="useremail" name="useremail" placeholder="placeholder">


                <label for="message">Message purpose</label>

                <label for="general">
                    <input type="radio" id="general" name="purpose" value="general inquiry">
                    General Inquiry
                </label>

                <label for="reservation">
                    <input type="radio" id="reservation" name="purpose"
                      value="reservation question">
                    Reservation Question
                </label>

                <label for="website">
                    <input type="radio" id="website" name="purpose" value="website suggestion">
                    Website Suggestion
                </label>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" cols="40"
                  placeholder="Enter a message"></textarea>
                <label>
                    <input type="checkbox" id="subscribe" name="subscribe" value="yes">
                    Please subscribe me to the monthly newsletter
                </label><br><br>
                <button type="submit">Get in Touch!</button>
            </form>
        </div>
        <section>

            <h2>We Are Here To Serve You</h2>

            <div class="adventures">


                <figure>
                    <img src="images/pict1.jpg" alt="accident rafting">
                    <figcaption>David-Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/pict2.jpg" alt="rafting in group">
                    <figcaption>Jeffery-Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/pict3.jpg" alt="happy rafting of people">
                    <figcaption>John-Profile</figcaption>
                </figure>
            </div>


        </section>

    </main>
    <footer>
        <p>© 2026, Funny Splash Rafting Company, Joe Kabusako Iviti</p>
        <nav class=" socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon" width="100">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon" width="100">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon" width="100">
            </a>

        </nav>
    </footer>


</body>

</html>
